<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Contacto - Apollo Mission</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css">
    <link rel="stylesheet" href="assets/css/style.css">
</head>
<body class="bg-dark text-white">

    <header>
        <nav class="navbar navbar-expand-lg navbar-dark bg-transparent">
            <div class="container-fluid">
                <a class="navbar-brand" href="index.html">Apollo Mission</a>
                <button class="navbar-toggler" type="button" data-bs-toggle="collapse" data-bs-target="#navbarNav">
                    <span class="navbar-toggler-icon"></span>
                </button>
                <div class="collapse navbar-collapse" id="navbarNav">
                    <ul class="navbar-nav ms-auto">
                        <li class="nav-item"><a class="nav-link" href="index.html">Home</a></li>
                        <li class="nav-item"><a class="nav-link" href="portfolio.html">Portfolio</a></li>
                        <button type="submit" class="btn btn-primary rounded-pill px-4 py-2 fw-bold d-inline-flex align-items-center justify-content-center">
                        <li class="nav-item"><a class="nav-link active" href="contact.html">Contacto</a></li>
                        </button>
                    </ul>
                </div>
            </div>
        </nav>
    </header>

    <main class="container my-5 text-center">
        <div class="py-5">
            <h1 class="display-3 fw-bold text-white">Contacto</h1>
            <p class="text-info">Ponte en contacto con nosotros para cualquier consulta</p>
        </div>
        
        <div class="row justify-content-center">
            <div class="col-md-6 col-lg-5">
                <div class="card bg-dark bg-opacity-50 text-white shadow-lg p-4 rounded-4" style="backdrop-filter: blur(10px); border: 1px solid rgba(255,255,255,0.1);">
                    <h2 class="h4 mb-4">Envíanos un mensaje</h2>
                    
                    <form>
                        <div class="mb-3 text-start">
                            <label class="form-label">Nombre</label>
                            <input type="text" class="form-control bg-dark text-white border-secondary" placeholder="Tu nombre">
                        </div>
                        <div class="mb-3 text-start">
                            <label class="form-label">Email</label>
                            <input type="email" class="form-control bg-dark text-white border-secondary" placeholder="tu@email.com">
                        </div>
                        <div class="mb-3 text-start">
                            <label class="form-label">Asunto</label>
                            <input type="text" class="form-control bg-dark text-white border-secondary" placeholder="¿Qué necesitas?">
                        </div>
                        <div class="mb-4 text-start">
                            <label class="form-label">Mensaje</label>
                            <textarea class="form-control bg-dark text-white border-secondary" rows="4" placeholder="Escribe aquí..."></textarea>
                        </div>
                        
                        <div class="d-grid">
                            <button type="submit" class="btn btn-primary rounded-pill px-4 py-2 fw-bold d-inline-flex align-items-center justify-content-center">
                                <i class="bi bi-rocket-takeoff-fill me-2"></i> Enviar mensaje
                            </button>
                        </div>
                    </form>
                </div>
            </div>
        </div>
    </main>

    <footer class="container mt-5 pt-4 border-top text-center text-white-50">
        <p class="small">© 2026 Apollo Mission. Todos los derechos reservados</p>
    </footer>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
